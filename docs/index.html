<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neonatal Unit Lookup</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            color: #1a202c;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.3rem; }
        header p { font-size: 0.95rem; opacity: 0.85; }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 1.5rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: white;
            color: #718096;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
        }

        .tab:hover { color: #2d6a9f; background: #f7fafc; }
        .tab.active { color: #2d6a9f; border-bottom-color: #2d6a9f; background: #ebf8ff; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Search */
        .search-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 1.5rem 2rem;
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .search-box input {
            flex: 1;
            font-size: 1.1rem;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus { border-color: #2d6a9f; }

        .search-box button {
            background: #2d6a9f;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .search-box button:hover { background: #1e3a5f; }
        .search-box button:disabled { background: #a0aec0; cursor: not-allowed; }

        /* Loading bar */
        .loading-bar {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 1.5rem 2rem;
            text-align: center;
            color: #718096;
        }

        .loading-bar .progress {
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            margin-top: 0.75rem;
            overflow: hidden;
        }

        .loading-bar .progress-fill {
            height: 100%;
            background: #2d6a9f;
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }

        /* Error */
        .error {
            background: #fff5f5;
            color: #c53030;
            border: 1px solid #feb2b2;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-top: 1.5rem;
            display: none;
        }

        /* Results */
        #results { display: none; margin-top: 1.5rem; }

        .result-header {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .result-header h2 { font-size: 1.4rem; }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-north { background: #ebf8ff; color: #2b6cb0; }
        .badge-south { background: #fefcbf; color: #975a16; }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 1.25rem;
            border-left: 4px solid #2d6a9f;
            transition: transform 0.15s;
        }

        .card:hover { transform: translateY(-2px); }
        .card.level-any { border-left-color: #2d6a9f; }
        .card.level-l1  { border-left-color: #38a169; }
        .card.level-l2  { border-left-color: #d69e2e; }
        .card.level-l3  { border-left-color: #e53e3e; }

        .card-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #718096;
            margin-bottom: 0.5rem;
        }

        .card-hospital { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.4rem; }
        .card-distance { font-size: 0.9rem; color: #4a5568; }
        .card-tags { margin-top: 0.5rem; display: flex; flex-wrap: wrap; gap: 4px; }
        .tag { display: inline-block; background: #fee2e2; color: #991b1b; font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 999px; letter-spacing: 0.02em; }

        /* Map */
        #map-container {
            margin-top: 1rem;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        #map { height: 400px; width: 100%; }

        /* Catchment map — full-screen breakout */
        #tab-catchment {
            margin: 0 calc(-50vw + 50%);
            width: 100vw;
            padding: 0;
        }

        #catchment-map {
            height: calc(100vh - 140px);
            width: 100%;
            border: none;
            border-radius: 0;
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #e2e8f0;
            border-top-color: #2d6a9f;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 0.5rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        footer {
            text-align: center;
            padding: 2rem;
            color: #a0aec0;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .search-box { flex-direction: column; }
            .search-box button { width: 100%; }
            .cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>🏥 Neonatal Unit Postcode Lookup</h1>
    <p>Find the nearest neonatal hospitals for any London postcode</p>
</header>

<div class="container">
    <div class="tabs">
        <button class="tab active" data-tab="lookup" onclick="switchTab('lookup')">🔍 Postcode Lookup</button>
        <button class="tab" data-tab="catchment" onclick="switchTab('catchment')">🗺️ Catchment Map</button>
    </div>

    <div class="tab-content active" id="tab-lookup">
        <div id="loading-state" class="loading-bar">
            <div>Loading 326,000 postcodes…</div>
            <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
        </div>

        <form class="search-box" id="searchForm" style="display:none;">
            <input type="text" id="postcodeInput" placeholder="Enter a postcode, e.g. SW1A 2AA" autocomplete="off" />
            <button type="submit" id="searchBtn">Search</button>
            <div class="spinner" id="spinner"></div>
        </form>

        <div class="error" id="error"></div>

        <div id="results">
            <div class="result-header">
                <h2 id="resultPostcode"></h2>
                <span class="badge" id="resultSide"></span>
            </div>
            <div class="cards" id="cards"></div>
            <div id="map-container">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <div class="tab-content" id="tab-catchment">
        <div id="catchment-loading" class="loading-bar">Loading catchment map…</div>
        <div id="catchment-map" style="display:none;"></div>
    </div>
</div>

<footer>
    Neonatal Unit Postcode Lookup · Data covers ~326,000 London-area postcodes
    &nbsp;·&nbsp;
    <a href="extra_maps.html" style="color:#2d6a9f;text-decoration:none;font-weight:600;">
        🗺️ Extra Maps
    </a>
</footer>

<script>
    // ── State ──
    let postcodeData = null;
    let hospitalData = null;
    let map = null;
    let markers = [];
    let catchmentLoaded = false;
    let catchmentMap = null;

    const levelClasses = ['level-any', 'level-l1', 'level-l2', 'level-l3'];
    const levelColours = ['#2d6a9f', '#38a169', '#d69e2e', '#e53e3e'];
    const levelLabels = ['Any Level', 'Level 1 — Special Care', 'Level 2 — High Dependency', 'Level 3 — NICU'];

    // ── Load data ──
    async function loadData() {
        const fill = document.getElementById('progressFill');
        fill.style.width = '20%';

        const [pcRes, hospRes] = await Promise.all([
            fetch('postcodes.json'),
            fetch('hospitals.json'),
        ]);

        fill.style.width = '60%';
        postcodeData = await pcRes.json();
        fill.style.width = '85%';
        hospitalData = hospRes.json ? await hospRes.json() : hospRes;
        fill.style.width = '100%';

        // Build hospital coord lookup
        window.hospCoords = {};
        hospitalData.forEach(h => {
            window.hospCoords[h.name] = { lat: h.lat, lon: h.lon, level: h.level, side: h.side, tags: h.tags || '' };
        });

        setTimeout(() => {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('searchForm').style.display = 'flex';
        }, 300);
    }

    loadData();

    // ── Tab switching ──
    function switchTab(tabName) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
        document.getElementById(`tab-${tabName}`).classList.add('active');

        if (tabName === 'catchment' && !catchmentLoaded) {
            buildCatchmentMap();
        }
    }

    // ── Build catchment map from hospital data ──
    async function buildCatchmentMap() {
        document.getElementById('catchment-loading').style.display = 'block';

        // Wait for data if not loaded yet
        while (!postcodeData || !hospitalData) {
            await new Promise(r => setTimeout(r, 100));
        }

        const mapDiv = document.getElementById('catchment-map');
        mapDiv.style.display = 'block';

        catchmentMap = L.map(mapDiv).setView([51.5, -0.1], 10);
        const baseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            maxZoom: 19,
        }).addTo(catchmentMap);

        // Sector colour families — each hospital gets a distinct shade within its sector
        // Hue ranges chosen to give clearly distinct families:
        //   NC=Blue(210-240), NE=Green(100-145), NW=Purple(270-310),
        //   SE=Orange(20-45), SW=Pink(330-355), Border=Brown(25-40 low-sat)
        const SECTOR_RANGES = {
            'NC':     { h: [210, 240], s: 75, lRange: [35, 60] },  // blues
            'NE':     { h: [105, 148], s: 70, lRange: [30, 58] },  // greens
            'NW':     { h: [270, 308], s: 65, lRange: [35, 58] },  // purples
            'SE':     { h: [20,  44],  s: 85, lRange: [38, 60] },  // oranges
            'SW':     { h: [330, 352], s: 70, lRange: [45, 65] },  // pinks
            'Border': { h: [25,  38],  s: 35, lRange: [35, 55] },  // browns
        };
        const SECTOR_ORDER = ['NC', 'NE', 'NW', 'SE', 'SW', 'Border'];
        const SECTOR_LABELS = {
            'NC': 'North Central', 'NE': 'North East', 'NW': 'North West',
            'SE': 'South East',    'SW': 'South West', 'Border': 'Border',
        };

        // Build sector → sorted hospital list
        const sectorHosps = {};
        SECTOR_ORDER.forEach(s => { sectorHosps[s] = []; });
        hospitalData.forEach(h => {
            const sec = h.sector || 'Border';
            if (sectorHosps[sec]) sectorHosps[sec].push(h.name);
            else sectorHosps['Border'].push(h.name);
        });

        // Assign one shade per hospital within its sector's hue/lightness range
        const colours = {};
        SECTOR_ORDER.forEach(sec => {
            const hosps = sectorHosps[sec];
            const n = hosps.length;
            const { h, s, lRange } = SECTOR_RANGES[sec];
            hosps.forEach((name, i) => {
                const t = n === 1 ? 0.5 : i / (n - 1);
                const hue = Math.round(h[0] + t * (h[1] - h[0]));
                const lit = Math.round(lRange[0] + t * (lRange[1] - lRange[0]));
                colours[name] = `hsl(${hue},${s}%,${lit}%)`;
            });
        });

        const names = postcodeData.names;

        // Create a layer group per hospital for the layer control
        const hospLayers = {};
        names.forEach(name => {
            hospLayers[name] = L.layerGroup().addTo(catchmentMap);
        });

        // Sample every 10th postcode for performance
        const keys = Object.keys(postcodeData.data);
        const sample = keys.filter((_, i) => i % 10 === 0);

        // Add dots in batches to avoid freezing
        const batchSize = 2000;
        for (let i = 0; i < sample.length; i += batchSize) {
            const batch = sample.slice(i, i + batchSize);
            batch.forEach(key => {
                const r = postcodeData.data[key];
                const hospName = names[r[4]];
                const col = colours[hospName] || '#888';
                L.circleMarker([r[1], r[2]], {
                    radius: 2,
                    color: col, fillColor: col, fillOpacity: 0.7, weight: 0,
                }).addTo(hospLayers[hospName]);
            });
            await new Promise(r => setTimeout(r, 0));
        }

        // Hospital markers
        const hospMarkerLayer = L.layerGroup().addTo(catchmentMap);
        hospitalData.forEach(h => {
            L.circleMarker([h.lat, h.lon], {
                radius: 8, color: '#1a202c', weight: 2,
                fillColor: colours[h.name] || '#333', fillOpacity: 1,
            }).bindPopup(`<b>${h.name}</b><br>Level ${h.level} | ${h.side}`)
              .bindTooltip(h.name).addTo(hospMarkerLayer);
        });

        // Layer control — hospitals grouped by sector
        const overlays = { 'Hospitals': hospMarkerLayer };
        SECTOR_ORDER.forEach(sec => {
            sectorHosps[sec].forEach(name => {
                const c = colours[name];
                overlays[`<span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${c};margin-right:5px;vertical-align:middle;"></span>${name}`] = hospLayers[name];
            });
        });
        L.control.layers({ 'Base Map': baseLayer }, overlays, { collapsed: false }).addTo(catchmentMap);

        // Add Deselect All / Select All toggle
        setTimeout(() => {
            const ctrl = document.querySelector('#catchment-map .leaflet-control-layers-overlays');
            if (!ctrl) return;
            const btn = document.createElement('div');
            btn.style.cssText = 'padding:6px 0 2px 0;text-align:center;border-top:1px solid #ccc;margin-top:4px;';
            const a = document.createElement('a');
            a.href = '#';
            a.style.cssText = 'cursor:pointer;font-size:12px;color:#2d6a9f;text-decoration:none;font-weight:600;';
            a.textContent = 'Deselect All';
            let allOn = true;
            a.onclick = function (e) {
                e.preventDefault();
                allOn = !allOn;
                ctrl.querySelectorAll('input[type=checkbox]').forEach(cb => { if (cb.checked !== allOn) cb.click(); });
                a.textContent = allOn ? 'Deselect All' : 'Select All';
            };
            btn.appendChild(a);
            ctrl.appendChild(btn);
        }, 500);

        // Add legend — grouped by sector
        const legend = L.control({ position: 'bottomleft' });
        legend.onAdd = function () {
            const div = L.DomUtil.create('div');
            div.style.cssText = 'background:white;padding:12px 16px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.25);font-size:12px;max-height:60vh;overflow-y:auto;line-height:1.7;min-width:190px;';
            let html = '<b style="font-size:13px">Neonatal Catchment Areas</b>';
            SECTOR_ORDER.forEach(sec => {
                const hosps = sectorHosps[sec];
                if (!hosps.length) return;
                html += `<div style="margin-top:8px;margin-bottom:2px;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#718096;font-weight:700;">${SECTOR_LABELS[sec]}</div>`;
                hosps.forEach(name => {
                    const c = colours[name];
                    html += `<div><span style="background:${c};width:12px;height:12px;display:inline-block;border-radius:2px;margin-right:6px;vertical-align:middle;"></span>${name}</div>`;
                });
            });
            div.innerHTML = html;
            return div;
        };
        legend.addTo(catchmentMap);

        document.getElementById('catchment-loading').style.display = 'none';
        catchmentLoaded = true;
    }

    // ── Search ──
    document.getElementById('searchForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const raw = document.getElementById('postcodeInput').value.trim();
        const key = raw.replace(/\s/g, '').toUpperCase();

        document.getElementById('error').style.display = 'none';
        document.getElementById('results').style.display = 'none';

        if (!key) return;

        if (!postcodeData.data[key]) {
            document.getElementById('error').textContent = `Postcode "${raw}" not found.`;
            document.getElementById('error').style.display = 'block';
            return;
        }

        const r = postcodeData.data[key];
        const names = postcodeData.names;

        const data = {
            postcode: r[0],
            lat: r[1],
            lon: r[2],
            side: r[3] === 0 ? 'North' : 'South',
            levels: [
                { label: levelLabels[0], hospital: names[r[4]], distance_km: r[5] },
                { label: levelLabels[1], hospital: names[r[6]], distance_km: r[7] },
                { label: levelLabels[2], hospital: names[r[8]], distance_km: r[9] },
                { label: levelLabels[3], hospital: names[r[10]], distance_km: r[11] },
            ],
        };

        // Header
        document.getElementById('resultPostcode').textContent = data.postcode;
        const badge = document.getElementById('resultSide');
        badge.textContent = data.side + ' London';
        badge.className = 'badge ' + (data.side === 'North' ? 'badge-north' : 'badge-south');

        // Cards
        const cardsEl = document.getElementById('cards');
        cardsEl.innerHTML = '';
        data.levels.forEach((lvl, i) => {
            const card = document.createElement('div');
            card.className = `card ${levelClasses[i]}`;
            const hInfo = window.hospCoords[lvl.hospital];
            let tagsHtml = '';
            if (hInfo && hInfo.level === 3 && hInfo.tags) {
                tagsHtml = '<div class="card-tags">' +
                    hInfo.tags.split(',').map(t =>
                        `<span class="tag">${t.trim()}</span>`
                    ).join(' ') + '</div>';
            }
            card.innerHTML = `
                <div class="card-label">${lvl.label}</div>
                <div class="card-hospital">${lvl.hospital}</div>
                <div class="card-distance">${lvl.distance_km} km away</div>
                ${tagsHtml}
            `;
            cardsEl.appendChild(card);
        });

        // Map
        document.getElementById('results').style.display = 'block';

        if (map) map.remove();

        map = L.map('map').setView([data.lat, data.lon], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            maxZoom: 19,
        }).addTo(map);

        markers = [];

        // Postcode marker
        const pcMarker = L.circleMarker([data.lat, data.lon], {
            radius: 8, color: '#1a202c', weight: 2, fillColor: '#fff', fillOpacity: 1,
        }).addTo(map).bindPopup(`<b>${data.postcode}</b><br>${data.side} London`);
        markers.push(pcMarker);

        // Hospital markers
        const seen = new Set();
        data.levels.forEach((lvl, i) => {
            if (seen.has(lvl.hospital)) return;
            seen.add(lvl.hospital);
            const hc = window.hospCoords[lvl.hospital];
            if (!hc) return;

            const hospMarker = L.circleMarker([hc.lat, hc.lon], {
                radius: 9, color: '#1a202c', weight: 2,
                fillColor: levelColours[i], fillOpacity: 0.9,
            }).addTo(map).bindPopup(`<b>${lvl.hospital}</b><br>${lvl.distance_km} km`);
            markers.push(hospMarker);

            L.polyline([[data.lat, data.lon], [hc.lat, hc.lon]], {
                color: levelColours[i], weight: 2, dashArray: '6,6', opacity: 0.6,
            }).addTo(map);
        });

        const group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.15));
    });
</script>

</body>
</html>
